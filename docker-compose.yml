services:
  # --- LiveKit Server (WebRTC SFU) ---
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:7880:7880"
      - "3478:3478/udp"
      - "7881:7881"
      - "50000-50200:50000-50200/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml
    depends_on:
      eam-meet-redis:
        condition: service_healthy
    networks:
      - eam-meet

  # --- LiveKit Egress (meeting recording → /recordings) ---
  egress:
    image: livekit/egress:latest
    restart: unless-stopped
    environment:
      - EGRESS_CONFIG_FILE=/etc/egress.yaml
    volumes:
      - ./egress.yaml:/etc/egress.yaml
      - eam-meet-recordings:/recordings
    cap_add:
      - SYS_ADMIN          # required by egress for the headless Chrome sandbox
    shm_size: "1gb"        # Chrome uses /dev/shm; default 64m crashes the compositor
    depends_on:
      eam-meet-redis:
        condition: service_healthy
      livekit:
        condition: service_started
    networks:
      - eam-meet

  # --- Next.js App ---
  eam-meet:
    build: ./app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - SPEAKER_AUDIO_DIR=/speaker-audio
    volumes:
      - eam-meet-recordings:/recordings   # read recordings written by egress
      - eam-meet-speaker-audio:/speaker-audio   # read per-speaker audio for re-transcription
    depends_on:
      eam-meet-db:
        condition: service_healthy
      eam-meet-redis:
        condition: service_healthy
    networks:
      - eam-meet

  # --- LiveKit Agent (Python) ---
  livekit-agent:
    build: ./agent
    restart: unless-stopped
    env_file: .env
    environment:
      - LIVEKIT_URL=ws://livekit:7880
      - SPEAKER_AUDIO_DIR=/speaker-audio
    volumes:
      - eam-meet-speaker-audio:/speaker-audio   # per-speaker audio (detection + re-transcription)
    depends_on:
      - livekit
      - eam-meet-db
    networks:
      - eam-meet

  # --- PostgreSQL ---
  eam-meet-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - eam-meet-pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - eam-meet

  # --- Redis (LiveKit + Egress coordination) ---
  eam-meet-redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - eam-meet-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - eam-meet

volumes:
  eam-meet-pgdata:
  eam-meet-redis-data:
  eam-meet-recordings:
  eam-meet-speaker-audio:

networks:
  eam-meet:
    driver: bridge
