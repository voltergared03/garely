<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Офлайн · EAM Meet</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(120% 120% at 50% 0%, #14161c 0%, #0b0d11 60%, #090a0d 100%);
      color: #e8eaed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: calc(24px + env(safe-area-inset-top));
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      text-align: center;
    }
    .card { max-width: 360px; }
    .badge {
      width: 64px; height: 64px; margin: 0 auto 22px;
      border-radius: 18px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 40px rgba(37, 99, 235, .35);
    }
    h1 { font-size: 20px; font-weight: 700; margin: 0 0 8px; letter-spacing: -.01em; }
    p { font-size: 14px; line-height: 1.55; color: #9aa0a6; margin: 0 0 24px; }
    button {
      font: inherit; font-weight: 600; font-size: 14px;
      color: #fff; background: #2563eb; border: 0;
      padding: 11px 22px; border-radius: 11px; cursor: pointer;
      transition: background .15s, transform .05s;
    }
    button:hover { background: #1d4ed8; }
    button:active { transform: scale(.97); }
    .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#ef4444; margin-right:7px; vertical-align: middle; animation: pulse 1.6s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .status { font-size: 12px; color: #6b7280; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <svg width="34" height="34" viewBox="0 0 32 32" aria-hidden="true">
        <rect x="4" y="8" width="16" height="16" rx="3" fill="none" stroke="#fff" stroke-width="2.2"/>
        <path d="M24 12l4-3v14l-4-3z" fill="#fff"/>
      </svg>
    </div>
    <h1>Немає підключення</h1>
    <p>Схоже, ви офлайн. Перевірте з'єднання з інтернетом — сторінка завантажиться, щойно зв'язок відновиться.</p>
    <button onclick="location.reload()">Спробувати ще раз</button>
    <div class="status"><span class="dot"></span>Очікування мережі…</div>
  </div>
  <script>
    // Auto-reload as soon as the network comes back.
    window.addEventListener('online', function () { location.reload(); });
  </script>
</body>
</html>
